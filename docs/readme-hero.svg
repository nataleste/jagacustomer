<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" font-family="Arial">
  <title id="title">JAGA README hero</title>
  <desc id="desc">A judge-facing hero image showing JAGA catching a live scam call, explaining the risk, alerting a guardian, and sealing a report.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A0F"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#2A0B0B"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="814" y1="120" x2="1182" y2="570" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EF4444" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="redShadow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#EF4444" flood-opacity="0.7"/>
    </filter>
    <style>
      text { font-family: Arial; }
      .sans { font-family: Arial; }
      .mono { font-family: Courier; }
      .heavy { font-weight: 900; }
      .bold { font-weight: 800; }
      .semibold { font-weight: 700; }
      .medium { font-weight: 600; }
    </style>
  </defs>

  <rect width="1280" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1066" cy="170" r="210" fill="url(#redGlow)" opacity="0.34"/>
  <circle cx="940" cy="585" r="310" fill="#EF4444" opacity="0.08"/>
  <path d="M0 580 C210 514 308 690 516 628 C730 564 792 470 1012 548 C1118 585 1195 622 1280 586 V720 H0 V580Z" fill="#FFFFFF" opacity="0.04"/>

  <g transform="translate(78 74)">
    <rect x="0" y="0" width="94" height="44" rx="14" fill="#EF4444"/>
    <text x="47" y="30" text-anchor="middle" class="sans heavy" font-size="23" fill="white">JAGA</text>
    <text x="112" y="29" class="sans semibold" font-size="18" fill="#E5E7EB">AI scam-call guardian</text>
  </g>

  <g transform="translate(78 155)">
    <text class="sans heavy" font-size="72" line-height="78" fill="#FFFFFF">
      <tspan x="0" y="0">Catch scam calls</tspan>
      <tspan x="0" y="82">while they happen.</tspan>
    </text>
    <text x="0" y="195" class="sans medium" font-size="25" fill="#CBD5E1">
      Live transcript, agent verdict, guardian escalation,
    </text>
    <text x="0" y="229" class="sans medium" font-size="25" fill="#CBD5E1">
      and a signed evidence report in one mobile flow.
    </text>
  </g>

  <g transform="translate(78 445)">
    <rect x="0" y="0" width="228" height="70" rx="22" fill="#FFFFFF"/>
    <text x="28" y="31" class="sans semibold" font-size="16" fill="#6B7280">LIVE RISK SCORE</text>
    <text x="28" y="58" class="sans heavy" font-size="30" fill="#D92D20">86 risk</text>
    <circle cx="192" cy="35" r="22" fill="#D92D20" filter="url(#redShadow)"/>
    <text x="192" y="44" text-anchor="middle" class="sans heavy" font-size="24" fill="white">!</text>
  </g>

  <g transform="translate(326 445)">
    <rect x="0" y="0" width="262" height="70" rx="22" fill="#101820" stroke="#2F3948"/>
    <text x="26" y="31" class="sans semibold" font-size="16" fill="#94A3B8">EVIDENCE SEAL</text>
    <text x="26" y="57" class="mono semibold" font-size="21" fill="#FDE68A">did:t3n... signed</text>
  </g>

  <g transform="translate(78 552)">
    <g>
      <rect x="0" y="0" width="158" height="46" rx="23" fill="#172033" stroke="#2E3B52"/>
      <circle cx="28" cy="23" r="7" fill="#22C55E"/>
      <text x="48" y="30" class="sans semibold" font-size="17" fill="#E5E7EB">Runs live</text>
    </g>
    <g transform="translate(176 0)">
      <rect x="0" y="0" width="210" height="46" rx="23" fill="#172033" stroke="#2E3B52"/>
      <circle cx="28" cy="23" r="7" fill="#FACC15"/>
      <text x="48" y="30" class="sans semibold" font-size="17" fill="#E5E7EB">Explains why</text>
    </g>
    <g transform="translate(404 0)">
      <rect x="0" y="0" width="198" height="46" rx="23" fill="#172033" stroke="#2E3B52"/>
      <circle cx="28" cy="23" r="7" fill="#EF4444"/>
      <text x="48" y="30" class="sans semibold" font-size="17" fill="#E5E7EB">Files report</text>
    </g>
  </g>

  <g transform="translate(766 38)" filter="url(#softShadow)">
    <rect x="0" y="0" width="404" height="646" rx="58" fill="#F8FAFC" stroke="#FFFFFF" stroke-width="6"/>
    <rect x="43" y="30" width="36" height="16" rx="4" fill="#0B0F14"/>
    <rect x="310" y="29" width="25" height="15" rx="4" fill="#0B0F14"/>
    <rect x="344" y="29" width="25" height="15" rx="4" fill="#0B0F14"/>
    <rect x="378" y="29" width="27" height="15" rx="5" fill="white" stroke="#0B0F14" stroke-width="3"/>

    <text x="44" y="94" class="sans heavy" font-size="20" fill="#6B7280" letter-spacing="2">CALL LOG</text>
    <text x="44" y="146" class="sans heavy" font-size="51" fill="#0B0F14">Calls</text>
    <rect x="290" y="92" width="76" height="44" rx="22" fill="#EEF0F4"/>
    <text x="328" y="121" text-anchor="middle" class="sans heavy" font-size="16" fill="#0B0F14">Reports</text>

    <rect x="44" y="185" width="67" height="44" rx="22" fill="#0B0F14"/>
    <text x="77" y="214" text-anchor="middle" class="sans heavy" font-size="18" fill="#FFFFFF">All</text>
    <rect x="121" y="185" width="74" height="44" rx="22" fill="#EEF0F4"/>
    <text x="158" y="214" text-anchor="middle" class="sans heavy" font-size="18" fill="#4B5563">Live</text>
    <rect x="205" y="185" width="122" height="44" rx="22" fill="#EEF0F4"/>
    <text x="266" y="214" text-anchor="middle" class="sans heavy" font-size="18" fill="#4B5563">Needs report</text>

    <rect x="44" y="254" width="318" height="162" rx="18" fill="#0B0F14"/>
    <text x="68" y="293" class="sans heavy" font-size="18" fill="#FFFFFF">LIVE CALL</text>
    <text x="68" y="347" class="sans heavy" font-size="24" fill="#FFFFFF">Unknown caller</text>
    <text x="68" y="382" class="sans medium" font-size="17" fill="#D1D5DB">Transcript streaming now</text>
    <text x="68" y="407" class="sans medium" font-size="18" fill="#FFFFFF">Do not tell anyone...</text>
    <circle cx="310" cy="334" r="43" fill="#EA2922"/>
    <text x="310" y="347" text-anchor="middle" class="sans heavy" font-size="32" fill="#FFFFFF">86</text>

    <rect x="44" y="438" width="102" height="38" rx="19" fill="#EA2922"/>
    <text x="95" y="463" text-anchor="middle" class="sans heavy" font-size="15" fill="#FFFFFF">High risk</text>
    <rect x="156" y="438" width="130" height="38" rx="19" fill="#263241"/>
    <text x="221" y="463" text-anchor="middle" class="sans heavy" font-size="15" fill="#FFFFFF">Open transcript</text>

    <text x="44" y="510" class="sans heavy" font-size="20" fill="#6B7280" letter-spacing="1.4">EVIDENCE</text>
    <rect x="44" y="532" width="318" height="72" rx="14" fill="#FEE4E2" stroke="#FDA29B"/>
    <text x="66" y="563" class="sans heavy" font-size="18" fill="#B42318">Money demand</text>
    <text x="66" y="588" class="sans medium" font-size="15" fill="#7A271A">Move funds to safe account</text>
    <text x="320" y="563" text-anchor="end" class="sans heavy" font-size="15" fill="#B42318">Report</text>
  </g>

  <g transform="translate(920 615)">
    <rect x="0" y="0" width="238" height="66" rx="20" fill="#FFFFFF" opacity="0.96"/>
    <text x="24" y="28" class="sans heavy" font-size="17" fill="#0B0F14">Guardian alert sent</text>
    <text x="24" y="51" class="sans medium" font-size="15" fill="#4B5563">Sarah sees the scam verdict</text>
  </g>
</svg>
